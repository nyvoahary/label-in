<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Label-in · {{ root }}</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --panel-2: #1f242d;
    --border: #2a3140;
    --text: #e6e8ee;
    --muted: #8a93a6;
    --accent: #f59e0b;
    --done: #22c55e;
    --pending: #eab308;
  }
  .light-theme {
    --bg: #f7f8fb;
    --panel: #ffffff;
    --panel-2: #f3f6fb;
    --border: #d9e2ec;
    --text: #111827;
    --muted: #6b7280;
    --accent: #f59e0b;
    --done: #22c55e;
    --pending: #eab308;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
  .logo { filter: invert(1); transition: filter .2s ease; }
  .light-theme .logo { filter: none; }
  .app { display: grid; grid-template-columns: 400px 1fr; height: 100vh; }
  .sidebar { background: var(--panel); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; min-height: 0; }
  .sidebar header { padding: 14px 16px; border-bottom: 1px solid var(--border); }
  .sidebar header h1 { font-size: 14px; margin: 0; font-weight: 600; }
  .sidebar header .sub { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .project-picker { padding: 10px 16px; border-bottom: 1px solid var(--border); }
  .project-picker label { font-size: 10px; color: var(--muted); text-transform: uppercase;
    letter-spacing: .05em; display: block; margin-bottom: 6px; }
  .project-picker select { width: 100%; background: var(--panel-2); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px; padding: 6px 8px; font-size: 12px; }
  .progress { padding: 10px 16px; border-bottom: 1px solid var(--border); font-size: 12px; color: var(--muted); }
  .progress-bar { height: 4px; background: var(--panel-2); border-radius: 2px; margin-top: 6px; overflow: hidden; }
  .progress-bar > div { height: 100%; background: var(--done); transition: width .2s; }
  .filter { padding: 8px 16px; border-bottom: 1px solid var(--border); display: flex; gap: 6px; }
  .filter button { flex: 1; background: var(--panel-2); color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; padding: 5px 8px; font-size: 11px; cursor: pointer; }
  .filter button.active { background: var(--accent); border-color: var(--accent); color: white; }
  .task-list { flex: 1; overflow-y: auto; }
  .task-item { padding: 10px 16px; border-bottom: 1px solid var(--border); cursor: pointer; font-size: 12px; }
  .task-item:hover { background: var(--panel-2); }
  .task-item.active { background: var(--panel-2); border-left: 3px solid var(--accent); padding-left: 13px; }
  .task-item .row1 { display: flex; justify-content: space-between; align-items: center; }
  .task-item .idx { color: var(--muted); font-variant-numeric: tabular-nums; font-size: 11px; }
  .task-item .badge { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .badge.done { background: var(--done); }
  .badge.pending { background: var(--pending); }
  .badge.review { background: #ef4444; }
  .badge.autosave { background: #90D6FF; }
  .task-item .preview { color: var(--muted); margin-top: 4px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .main { display: flex; flex-direction: column; min-width: 0; }
  .toolbar { padding: 10px 20px; border-bottom: 1px solid var(--border); display: flex; gap: 10px;
    align-items: center; background: var(--panel); }
  .toolbar .spacer { flex: 1; }
  .toolbar button, .toolbar a.btn { background: var(--panel-2); color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 12px; font-size: 12px; cursor: pointer; text-decoration: none; }
  .toolbar .theme-btn { display: inline-flex; align-items: center; justify-content: center; width: 38px; padding: 6px; transition: transform .15s ease, background .15s ease, border-color .15s ease, color .15s ease; overflow: hidden; }
  .toolbar .theme-btn:hover { transform: scale(1.05); border-color: var(--accent); background: rgba(255, 255, 255, 0.08); }
  .toolbar .theme-btn:active { transform: scale(0.98); background: rgba(255, 255, 255, 0.14); }
  .light-theme .toolbar .theme-btn:hover { background: rgba(0, 0, 0, 0.05); }
  .light-theme .toolbar .theme-btn:active { background: rgba(0, 0, 0, 0.1); }
  .toolbar .theme-btn.animating { animation: icon-slide 240ms ease; }
  @keyframes icon-slide { 0% { opacity: 0; transform: translateY(12px); } 100% { opacity: 1; transform: translateY(0); } }
  .toolbar button.primary { background: var(--accent); border-color: var(--accent); color: white; }
  .toolbar button:hover { border-color: var(--accent); }
  .toolbar .meta { font-size: 12px; color: var(--muted); }
  .overflow-menu { position: relative; }
  .overflow-btn { font-size: 18px !important; line-height: 1; padding: 2px 10px !important; letter-spacing: 2px; }
  .overflow-dropdown { position: absolute; top: 100%; right: 0; margin-top: 4px;
    background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
    min-width: 180px; display: none; z-index: 100; overflow: hidden; }
  .overflow-dropdown.open { display: block; }
  .overflow-dropdown button { display: block; width: 100%; background: none; border: none;
    color: var(--text); padding: 10px 14px; font-size: 13px; text-align: left; cursor: pointer; }
  .overflow-dropdown button:hover { background: var(--panel-2); }
  .overflow-dropdown button + button { border-top: 1px solid var(--border); }

  .content { flex: 1; padding: 24px 32px; overflow-y: auto; }
  .meta-row { display: flex; gap: 18px; font-size: 12px; color: var(--muted); margin-bottom: 14px; flex-wrap: wrap; }
  .meta-row b { color: var(--text); font-weight: 500; }

  .waveform-wrap { background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
    padding: 12px; margin-bottom: 12px; }
  #waveform { width: 100%; min-height: 96px; cursor: crosshair; }
  .player-controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
    margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
  .player-controls button { background: var(--panel-2); color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; padding: 5px 10px; font-size: 12px; cursor: pointer; }
  .player-controls button:hover { border-color: var(--accent); }
  .player-controls button.active { background: var(--accent); border-color: var(--accent); color: white; }
  .player-controls .time { font-variant-numeric: tabular-nums; font-size: 12px; color: var(--muted); }
  .player-controls .sep { width: 1px; height: 18px; background: var(--border); }

  .rates { display: flex; gap: 4px; margin-left: auto; align-items: center; font-size: 12px; color: var(--muted); }
  .rates button { background: var(--panel-2); color: var(--text); border: 1px solid var(--border);
    border-radius: 4px; padding: 3px 8px; font-size: 11px; cursor: pointer; }
  .rates button.active { background: var(--accent); border-color: var(--accent); color: white; }

  .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em;
    margin-bottom: 6px; margin-top: 14px; display: flex; justify-content: space-between; }
  .predictions-row { display: flex; gap: 10px; margin-bottom: 6px; flex-wrap: wrap; }
  .prediction { background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
    padding: 12px 14px; font-size: 14px; line-height: 1.5; color: var(--muted);
    font-style: italic; user-select: text; flex: 1; min-width: 180px;
    overflow-wrap: break-word; word-break: break-word; }
  .prediction .pred-header { display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 8px; font-style: normal; }
  .prediction .pred-model { font-size: 11px; font-weight: 600; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 70%; }
  .prediction .pred-score { font-size: 11px; color: var(--muted); }
  .prediction .pred-copy { background: transparent; border: none; color: var(--accent);
    cursor: pointer; font-size: 11px; padding: 0; font-style: normal; }
  .pred-word { cursor: pointer; border-radius: 3px; padding: 1px 0; }
  .pred-word:hover { background: rgba(79,140,255,0.25); color: var(--text); }
  textarea { width: 100%; min-height: 140px; background: var(--panel); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px; padding: 14px; font-size: 16px;
    line-height: 1.5; font-family: inherit; resize: vertical; }
  textarea:focus { outline: none; border-color: var(--accent); }

  .actions { display: flex; gap: 10px; margin-top: 16px; align-items: center; }
  .actions .save { background: var(--accent); border-color: var(--accent); color: white; }
  .actions button { padding: 9px 18px; font-size: 13px; border-radius: 6px; cursor: pointer;
    border: 1px solid var(--border); color: var(--text); background: var(--panel-2); }
  .actions .status { margin-left: auto; font-size: 12px; color: var(--muted); }
  .actions .status.saved { color: var(--done); }
  .actions .status.autosaved { color: #90D6FF; }

  .hints { margin-top: 28px; font-size: 11px; color: var(--muted); border-top: 1px solid var(--border); padding-top: 14px; }
  .hints kbd { background: var(--panel-2); border: 1px solid var(--border); border-radius: 3px;
    padding: 1px 6px; font-size: 10px; font-family: ui-monospace, monospace; }
  .empty { padding: 60px; text-align: center; color: var(--muted); }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <header>
      <div style="display: flex; align-items: center;">
        <img src="/static/logo.png" alt="Logo" class="logo" style="height: 40px; margin-right: 10px;">
      </div>
    </header>
    <div class="project-picker">
      <label>Project</label>
      <select id="projectSelect"></select>
    </div>
    <div class="progress">
      <div><span id="progressText">0 / 0 done</span></div>
      <div class="progress-bar"><div id="progressFill" style="width:0"></div></div>
    </div>
    <div class="filter">
      <button data-filter="all" class="active">All</button>
      <button data-filter="pending">Pending</button>
      <button data-filter="done">Done</button>
      <button data-filter="review">Review <span id="reviewCount"></span></button>
    </div>
    <div id="taskList" class="task-list"></div>
  </aside>

  <main class="main">
    <div class="toolbar">
      <button id="prevBtn">← Prev</button>
      <button id="nextBtn">Next →</button>
      <span class="meta" id="metaIdx">—</span>
      <div class="spacer"></div>
      <a class="btn" href="/">Dashboard</a>
      <button id="themeBtn" class="theme-btn" title="Toggle theme">🌙</button>
      <div class="overflow-menu">
        <button class="btn overflow-btn" id="overflowBtn" title="More actions">⋯</button>
        <div class="overflow-dropdown" id="overflowDropdown">
          <button id="backupBtn">Backup to NAS</button>
          <button id="syncBtn">Sync from NAS</button>
        </div>
      </div>
    </div>
    <div class="content" id="content">
      <div class="empty">Loading…</div>
    </div>
  </main>
</div>

<script type="module">
import WaveSurfer from "{{ url_for('static', filename='wavesurfer/wavesurfer.esm.js') }}";
import RegionsPlugin from "{{ url_for('static', filename='wavesurfer/plugins/regions.esm.js') }}";

const state = {
  projects: [],
  project: null,
  tasks: [],
  current: null,
  filter: "all",
  ws: null,
  regions: null,
  loopRegion: null,
  loop: true,
  rate: 1,
  saveTimer: null,
};

const STORAGE_KEY = "labelin.lastProject";

// Cursor position saved from the annotation textarea before it loses focus.
let savedCursor = 0;

function trackCursor(ta) {
  const save = () => { savedCursor = ta.selectionStart; };
  ta.addEventListener("keyup", save);
  ta.addEventListener("click", save);
  ta.addEventListener("mouseup", save);
  ta.addEventListener("blur", save);
}

function insertPredictionText(word) {
  const ta = document.getElementById("annotation");
  if (!ta) return;
  const text = ta.value;
  const pos = savedCursor;
  let start = pos;
  let end = pos;
  // Expand outward to word boundaries (non-whitespace chars).
  while (start > 0 && /\S/.test(text[start - 1])) start--;
  while (end < text.length && /\S/.test(text[end])) end++;
  const newText = text.slice(0, start) + word + text.slice(end);
  ta.value = newText;
  const newPos = start + word.length;
  ta.focus();
  ta.setSelectionRange(newPos, newPos);
  savedCursor = newPos;
}

function setupPredictionWords(container) {
  if (!container) return;
  container.querySelectorAll(".pred-body").forEach(predEl => {
    const raw = predEl.dataset.raw || "";
    if (!raw) return;
    const tokens = raw.split(/(\s+)/);
    predEl.innerHTML = tokens.map(tok => {
      if (/^\s+$/.test(tok)) return escapeHtml(tok);
      return `<span class="pred-word" data-word="${escapeHtml(tok)}">${escapeHtml(tok)}</span>`;
    }).join("");

    let pendingSelection = null;

    predEl.addEventListener("mousedown", () => { pendingSelection = null; });
    predEl.addEventListener("mouseup", () => {
      const sel = window.getSelection();
      if (sel && sel.toString().trim()) pendingSelection = sel.toString().trim();
    });
    predEl.querySelectorAll(".pred-word").forEach(span => {
      span.addEventListener("mousedown", e => e.preventDefault());
      span.addEventListener("click", () => {
        const word = pendingSelection || span.dataset.word;
        pendingSelection = null;
        insertPredictionText(word);
      });
    });
  });
}

async function fetchProjects() {
  const r = await fetch("/api/projects");
  const j = await r.json();
  state.projects = j.projects;
  const sel = document.getElementById("projectSelect");
  if (!state.projects.length) {
    document.getElementById("content").innerHTML =
      `<div class="empty">No projects found in <code>${j.root}</code>.<br>
       Each project must be a subfolder containing a <code>*.label_studio.json</code>.</div>`;
    sel.innerHTML = "<option>(none)</option>";
    return;
  }
  sel.innerHTML = state.projects.map(p => {
    const pct = p.total ? (p.done / p.total) * 100 : 0;
    return `<option value="${p.name}">${p.name}  —  ${p.done}/${p.total} (${pct.toFixed(0)}%)</option>`;
  }).join("");
  const last = localStorage.getItem(STORAGE_KEY);
  const initial = state.projects.find(p => p.name === last)?.name || state.projects[0].name;
  sel.value = initial;
  await switchProject(initial);
  sel.onchange = () => switchProject(sel.value);
}

async function switchProject(name) {
  state.project = name;
  localStorage.setItem(STORAGE_KEY, name);
  document.getElementById("backupBtn").onclick = async () => {
    const btn = document.getElementById("backupBtn");
    btn.disabled = true;
    btn.textContent = "Backing up…";
    try {
      const r = await fetch(`/api/projects/${encodeURIComponent(name)}/backup`, { method: "POST" });
      const j = await r.json();
      btn.textContent = j.ok ? "✓ Backed up" : "✗ Failed";
      if (!j.ok) console.error(j.error);
    } catch (e) {
      btn.textContent = "✗ Error";
      console.error(e);
    } finally {
      setTimeout(() => { btn.disabled = false; btn.textContent = "Backup to NAS"; }, 2500);
    }
  };

  document.getElementById("syncBtn").onclick = async () => {
    const btn = document.getElementById("syncBtn");
    btn.disabled = true;
    btn.textContent = "Syncing…";
    try {
      const r = await fetch(`/api/projects/${encodeURIComponent(name)}/sync`, { method: "POST" });
      const j = await r.json();
      if (!r.ok) {
        btn.textContent = `✗ ${j.error}`;
      } else if (j.action === "skipped") {
        btn.textContent = "✓ Already up to date";
      } else {
        btn.textContent = `✓ Pulled ${j.pulled} task${j.pulled !== 1 ? "s" : ""}`;
        await fetchTasks();
      }
    } catch (e) {
      btn.textContent = "✗ Error";
      console.error(e);
    } finally {
      setTimeout(() => { btn.disabled = false; btn.textContent = "Sync from NAS"; }, 3000);
    }
  };
  await fetchTasks();
}

async function fetchTasks() {
  const r = await fetch(`/api/projects/${encodeURIComponent(state.project)}/tasks`);
  const j = await r.json();
  state.tasks = j.tasks;
  state.current = null;
  renderSidebar();
  if (state.tasks.length) {
    const firstPending = state.tasks.find(t => t.status !== "done");
    select((firstPending || state.tasks[0]).index);
  } else {
    document.getElementById("content").innerHTML = `<div class="empty">No tasks in this project.</div>`;
  }
}

function renderSidebar() {
  const list = document.getElementById("taskList");
  const filtered = state.tasks.filter(t =>
    state.filter === "all" ? true :
    state.filter === "done" ? t.status === "done" :
    state.filter === "pending" ? t.status === "pending" :
    state.filter === "review" ? (t.status === "review" || t.status === "autosave") :
    true
  );
  list.innerHTML = filtered.map(t => `
    <div class="task-item ${t.index === state.current ? "active" : ""}" data-idx="${t.index}">
      <div class="row1">
        <span class="idx">#${String(t.index).padStart(4,"0")}</span>
        <span class="badge ${t.status}"></span>
      </div>
      <div class="preview">${escapeHtml(t.annotation || t.prediction || "(no text)")}</div>
    </div>
  `).join("");
  list.querySelectorAll(".task-item").forEach(el => {
    el.addEventListener("click", () => select(parseInt(el.dataset.idx)));
  });
  const done = state.tasks.filter(t => t.status === "done").length;
  const pct = state.tasks.length ? (done / state.tasks.length) * 100 : 0;
  document.getElementById("progressText").textContent =
    `${done} / ${state.tasks.length} done  ·  ${pct.toFixed(1)}%`;
  document.getElementById("progressFill").style.width = pct + "%";
  const sel = document.getElementById("projectSelect");
  const opt = sel.querySelector(`option[value="${CSS.escape(state.project)}"]`);
  if (opt) opt.textContent = `${state.project}  —  ${done}/${state.tasks.length} (${pct.toFixed(0)}%)`;
  const reviewCount = state.tasks.filter(t => t.status === "review" || t.status === "autosave").length;
  const rc = document.getElementById("reviewCount");
  if (rc) rc.textContent = reviewCount ? `(${reviewCount})` : "";
}

function teardownWavesurfer() {
  if (state.ws) {
    try { state.ws.destroy(); } catch (e) { /* ignore */ }
  }
  state.ws = null;
  state.regions = null;
  state.loopRegion = null;
}

function fmtTime(s) {
  if (!isFinite(s)) return "—";
  const m = Math.floor(s / 60);
  const sec = (s - m * 60).toFixed(2).padStart(5, "0");
  return `${m}:${sec}`;
}

function updateTimeDisplay() {
  const el = document.getElementById("timeDisplay");
  if (!el || !state.ws) return;
  const cur = state.ws.getCurrentTime();
  const dur = state.ws.getDuration();
  let label = `${fmtTime(cur)} / ${fmtTime(dur)}`;
  if (state.loopRegion) {
    label += `  ·  loop ${fmtTime(state.loopRegion.start)}–${fmtTime(state.loopRegion.end)}`;
  } else if (state.loop) {
    label += `  ·  loop full clip`;
  }
  el.textContent = label;
}

function setOrUpdateLoopRegion(start, end) {
  if (!state.regions) return;
  if (state.loopRegion) {
    state.loopRegion.setOptions({ start, end });
  } else {
    const region = state.regions.addRegion({
      start, end,
      color: "rgba(79, 140, 255, 0.18)",
      drag: true,
      resize: true,
    });
    state.loopRegion = region;
  }
  updateTimeDisplay();
  updateLoopButtonStates();
}

function clearLoop() {
  if (state.loopRegion) {
    try { state.loopRegion.remove(); } catch (e) { /* ignore */ }
    state.loopRegion = null;
  }
  updateTimeDisplay();
  updateLoopButtonStates();
}

function updateLoopButtonStates() {
  const loopBtn = document.getElementById("loopBtn");
  if (loopBtn) loopBtn.classList.toggle("active", state.loop);
  // Also refresh the time display so the "loop full clip" hint appears/disappears.
  updateTimeDisplay();
}

function initWavesurfer(audioUrl) {
  teardownWavesurfer();
  const ws = WaveSurfer.create({
    container: "#waveform",
    waveColor: "#4f8cff",
    progressColor: "#2dd4bf",
    cursorColor: "#e6e8ee",
    cursorWidth: 1,
    barWidth: 2,
    barGap: 1,
    barRadius: 1,
    height: 96,
    normalize: true,
    url: audioUrl,
  });
  state.ws = ws;

  const regions = ws.registerPlugin(RegionsPlugin.create());
  state.regions = regions;

  // Drag on the empty waveform to create / replace the loop region.
  regions.enableDragSelection({ color: "rgba(79, 140, 255, 0.18)" });

  regions.on("region-created", (region) => {
    // Only one loop region at a time.
    regions.getRegions().forEach(r => { if (r !== region) r.remove(); });
    state.loopRegion = region;
    updateTimeDisplay();
    updateLoopButtonStates();
  });
  regions.on("region-updated", (region) => {
    state.loopRegion = region;
    updateTimeDisplay();
  });
  regions.on("region-removed", (region) => {
    if (state.loopRegion === region) state.loopRegion = null;
    updateLoopButtonStates();
  });

  ws.on("ready", () => {
    ws.setPlaybackRate(state.rate, true);
    updateTimeDisplay();
  });
  ws.on("audioprocess", () => {
    updateTimeDisplay();
    if (state.loop && state.loopRegion) {
      const t = ws.getCurrentTime();
      if (t >= state.loopRegion.end - 0.01) {
        ws.setTime(state.loopRegion.start);
      }
    }
  });
  ws.on("interaction", () => updateTimeDisplay());
  ws.on("finish", () => {
    if (!state.loop) return;
    const start = state.loopRegion ? state.loopRegion.start : 0;
    ws.setTime(start);
    ws.play();
  });
}

function select(idx) {
  state.current = idx;
  const t = state.tasks[idx];
  if (!t) return;
  document.getElementById("metaIdx").textContent =
    `${state.project} · Task ${idx + 1} / ${state.tasks.length}`;
  const dur = t.duration ? t.duration.toFixed(2) + "s" : "—";
  const conf = t.confidence != null ? t.confidence.toFixed(3) : "—";
  const audioUrl = `/audio/${encodeURIComponent(state.project)}/${encodeURIComponent(t.audio)}`;
  document.getElementById("content").innerHTML = `
    <div class="meta-row">
      <span><b>${escapeHtml(t.audio)}</b></span>
      <span>start: <b>${t.start ?? "—"}</b></span>
      <span>end: <b>${t.end ?? "—"}</b></span>
      <span>duration: <b>${dur}</b></span>
      <span>confidence: <b>${conf}</b></span>
    </div>
    <div class="waveform-wrap">
      <div id="waveform"></div>
      <div class="player-controls">
        <button id="playBtn">▶ Play</button>
        <button id="restartBtn" title="Restart from start (or loop start)">⟲ Restart</button>
        <span class="sep"></span>
        <button id="loopStartBtn" title="Set loop start at playhead ([)">[ Loop start</button>
        <button id="loopEndBtn" title="Set loop end at playhead (])">Loop end ]</button>
        <button id="loopBtn" class="${state.loop ? "active" : ""}" title="Toggle loop (L)">↻ Loop</button>
        <button id="clearLoopBtn" title="Clear loop region (\\)">✕ Clear</button>
        <span class="sep"></span>
        <span class="time" id="timeDisplay">0:00.00 / —</span>
        <div class="rates">
          ${[0.5, 0.75, 1, 1.25, 1.5].map(r =>
            `<button data-rate="${r}" class="${r === state.rate ? "active" : ""}">${r}×</button>`
          ).join("")}
        </div>
      </div>
    </div>
    <div class="label"><span>Predictions</span></div>
    <div class="predictions-row" id="predictionsRow">
      ${(t.predictions && t.predictions.length ? t.predictions : [{model:"default",score:null,text:t.prediction||""}]).map((p, pi) => `
        <div class="prediction" data-pred-index="${pi}">
          <div class="pred-header">
            <span class="pred-model" title="${escapeHtml(p.model)}">${escapeHtml(p.model)}</span>
            <span class="pred-score">${p.score != null ? p.score.toFixed(3) : "—"}</span>
            <button class="pred-copy" data-pred-index="${pi}">Copy ↓</button>
          </div>
          <div class="pred-body" data-raw="${escapeHtml(p.text)}">${escapeHtml(p.text || "(empty)")}</div>
        </div>
      `).join("")}
    </div>
    <div class="label">Annotation</div>
    <textarea id="annotation" placeholder="Type the transcription...">${escapeHtml(t.annotation || (t.status === "done" ? "" : t.prediction) || "")}</textarea>
    <div class="actions">
      <button class="save" id="saveBtn">Save & Next</button>
      <button id="skipBtn">Skip →</button>
      <button id="markPending">Mark Pending</button>
      <button id="markReview">Mark for Review</button>
      <span class="status" id="saveStatus">${t.status === "done" ? "✓ saved" : ""}</span>
    </div>
    <div class="hints">
      <kbd>Ctrl</kbd>+<kbd>Enter</kbd> Save & Next ·
      <kbd>Tab</kbd>/<kbd>Shift+Tab</kbd> Next/Prev ·
      <kbd>Space</kbd> Play/Pause ·
      <kbd>R</kbd> Restart ·
      <kbd>[</kbd>/<kbd>]</kbd> Set loop start/end ·
      <kbd>L</kbd> Toggle loop ·
      <kbd>\\</kbd> Clear loop ·
      <kbd>Ctrl</kbd>+<kbd>D</kbd> Copy prediction
      <br><span style="color:var(--muted)">Tip: drag on the waveform to draw a loop region. Click a word in the prediction to replace the word at your cursor; select multiple words then click to insert the selection.</span>
    </div>
  `;

  initWavesurfer(audioUrl);

  const ta = document.getElementById("annotation");
  ta.focus();
  ta.setSelectionRange(ta.value.length, ta.value.length);
  savedCursor = ta.value.length;
  trackCursor(ta);
  setupPredictionWords(document.getElementById("predictionsRow"));

  document.getElementById("playBtn").onclick = () => state.ws?.playPause();
  document.getElementById("restartBtn").onclick = () => {
    if (!state.ws) return;
    const start = state.loop && state.loopRegion ? state.loopRegion.start : 0;
    state.ws.setTime(start);
    state.ws.play();
  };
  document.getElementById("loopStartBtn").onclick = () => setLoopStartAtPlayhead();
  document.getElementById("loopEndBtn").onclick = () => setLoopEndAtPlayhead();
  document.getElementById("loopBtn").onclick = () => {
    state.loop = !state.loop;
    updateLoopButtonStates();
  };
  document.getElementById("clearLoopBtn").onclick = () => clearLoop();

  document.querySelectorAll(".rates button").forEach(b => {
    b.onclick = () => {
      state.rate = parseFloat(b.dataset.rate);
      state.ws?.setPlaybackRate(state.rate, true);
      document.querySelectorAll(".rates button").forEach(x => x.classList.toggle("active", x === b));
    };
  });
  document.querySelectorAll(".pred-copy").forEach(btn => {
    btn.addEventListener("mousedown", e => e.preventDefault());
    btn.onclick = () => {
      const pi = parseInt(btn.dataset.predIndex);
      const pred = (t.predictions && t.predictions[pi]) || {text: t.prediction || ""};
      ta.value = pred.text || "";
      ta.focus();
      savedCursor = ta.value.length;
      ta.setSelectionRange(savedCursor, savedCursor);
    };
  });
  document.getElementById("saveBtn").onclick = () => save(true);
  document.getElementById("skipBtn").onclick = () => goto(getNextFilteredIndex(idx));
  document.getElementById("markPending").onclick = () => save(false, "pending");
  document.getElementById("markReview").onclick = () => save(false, "review");

  ta.addEventListener("input", () => {
    clearTimeout(state.saveTimer);
    state.saveTimer = setTimeout(() => autoSave(), 1500);
  });

  if (state.ws) {
    state.ws.on("play", () => { document.getElementById("playBtn").textContent = "⏸ Pause"; });
    state.ws.on("pause", () => { document.getElementById("playBtn").textContent = "▶ Play"; });
  }

  renderSidebar();
  scrollSidebarToCurrent();
}

function setLoopStartAtPlayhead() {
  if (!state.ws) return;
  const t = state.ws.getCurrentTime();
  const dur = state.ws.getDuration();
  if (state.loopRegion) {
    const end = Math.max(t + 0.05, state.loopRegion.end);
    setOrUpdateLoopRegion(t, end);
  } else {
    setOrUpdateLoopRegion(t, Math.min(dur, t + 1));
  }
}

function setLoopEndAtPlayhead() {
  if (!state.ws) return;
  const t = state.ws.getCurrentTime();
  if (state.loopRegion) {
    const start = Math.min(t - 0.05, state.loopRegion.start);
    setOrUpdateLoopRegion(Math.max(0, start), t);
  } else {
    setOrUpdateLoopRegion(Math.max(0, t - 1), t);
  }
}

function scrollSidebarToCurrent() {
  const el = document.querySelector(".task-item.active");
  if (el) el.scrollIntoView({ block: "nearest" });
}

async function autoSave() {
  const ta = document.getElementById("annotation");
  if (!ta) return;
  const text = ta.value.trim();
  const status = "autosave";
  const idx = state.current;
  if (state.saveController) state.saveController.abort();
  const controller = new AbortController();
  state.saveController = controller;
  try {
    const r = await fetch(`/api/projects/${encodeURIComponent(state.project)}/tasks/${idx}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text, status }),
      signal: controller.signal,
    });
    const j = await r.json();
    if (j.ok) {
      state.tasks[idx].annotation = text;
      state.tasks[idx].status = status;
      document.getElementById("saveStatus").textContent = "✓ auto-saved";
      document.getElementById("saveStatus").classList.add("autosaved");
      renderSidebar();
    }
  } catch (e) {
    if (e.name === "AbortError") return;
    console.warn("autoSave failed", e);
  }
}

async function save(advance, statusOverride) {
  clearTimeout(state.saveTimer);
  const ta = document.getElementById("annotation");
  if (!ta) return;
  const text = ta.value.trim();
  const status = statusOverride || (text ? "done" : "pending");
  const idx = state.current;
  // Capture next filtered index before save, in case the status change drops this task from the filter
  const nextIdx = advance ? getNextFilteredIndex(idx) : -1;
  document.getElementById("saveStatus").textContent = "saving…";
  const r = await fetch(`/api/projects/${encodeURIComponent(state.project)}/tasks/${idx}`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ text, status }),
  });
  const j = await r.json();
  if (j.ok) {
    state.tasks[idx].annotation = text;
    state.tasks[idx].status = status;
    document.getElementById("saveStatus").textContent = "✓ saved";
    document.getElementById("saveStatus").classList.add("saved");
    renderSidebar();
    if (advance) {
      if (nextIdx >= 0) goto(nextIdx);
      else {
        const filtered = getFilteredTasks();
        if (filtered.length) goto(filtered[0].index);
      }
    }
  } else {
    document.getElementById("saveStatus").textContent = "save failed";
  }
}

function getFilteredTasks() {
  return state.tasks.filter(t =>
    state.filter === "all" ? true :
    state.filter === "done" ? t.status === "done" :
    state.filter === "pending" ? t.status === "pending" :
    state.filter === "review" ? (t.status === "review" || t.status === "autosave") :
    true
  );
}

function getNextFilteredIndex(currentIdx) {
  const filtered = getFilteredTasks();
  const pos = filtered.findIndex(t => t.index === currentIdx);
  if (pos === -1 || pos >= filtered.length - 1) return -1;
  return filtered[pos + 1].index;
}

function getPrevFilteredIndex(currentIdx) {
  const filtered = getFilteredTasks();
  const pos = filtered.findIndex(t => t.index === currentIdx);
  if (pos <= 0) return -1;
  return filtered[pos - 1].index;
}

function goto(idx) {
  if (idx < 0 || idx >= state.tasks.length) return;
  select(idx);
}

function escapeHtml(s) {
  return String(s ?? "").replace(/[&<>"']/g, c => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
  })[c]);
}

document.querySelectorAll(".filter button").forEach(b => {
  b.onclick = () => {
    state.filter = b.dataset.filter;
    document.querySelectorAll(".filter button").forEach(x =>
      x.classList.toggle("active", x === b));
    renderSidebar();
  };
});
document.getElementById("prevBtn").onclick = () => goto(getPrevFilteredIndex(state.current));
document.getElementById("nextBtn").onclick = () => goto(getNextFilteredIndex(state.current));

document.addEventListener("keydown", (e) => {
  const ta = document.getElementById("annotation");
  if (e.ctrlKey && e.key === "Enter") { e.preventDefault(); save(true); return; }
  if (e.ctrlKey && (e.key === "d" || e.key === "D")) {
    e.preventDefault();
    const cur = state.tasks[state.current];
    if (ta) ta.value = (cur?.predictions?.[0]?.text) || cur?.prediction || "";
    return;
  }
  if (e.key === "Tab") {
    e.preventDefault();
    goto(e.shiftKey ? getPrevFilteredIndex(state.current) : getNextFilteredIndex(state.current));
    return;
  }
  if (document.activeElement === ta) return;
  if (e.key === " ") {
    e.preventDefault();
    state.ws?.playPause();
  } else if (e.key === "r" || e.key === "R") {
    if (!state.ws) return;
    const start = state.loop && state.loopRegion ? state.loopRegion.start : 0;
    state.ws.setTime(start);
    state.ws.play();
  } else if (e.key === "[") {
    setLoopStartAtPlayhead();
  } else if (e.key === "]") {
    setLoopEndAtPlayhead();
  } else if (e.key === "l" || e.key === "L") {
    state.loop = !state.loop;
    updateLoopButtonStates();
  } else if (e.key === "\\") {
    clearLoop();
  }
});

function setTheme(theme) {
  const isLight = theme === "light";
  document.documentElement.classList.toggle("light-theme", isLight);
  const themeBtn = document.getElementById("themeBtn");
  if (themeBtn) themeBtn.textContent = isLight ? "🌙" : "☀️";
  localStorage.setItem("labelin.theme", theme);
}

function toggleTheme() {
  const btn = document.getElementById("themeBtn");
  if (btn) {
    btn.classList.add("animating");
    btn.addEventListener("animationend", () => btn.classList.remove("animating"), { once: true });
  }
  setTheme(document.documentElement.classList.contains("light-theme") ? "dark" : "light");
}

// Overflow menu toggle
const overflowBtn = document.getElementById("overflowBtn");
const overflowDropdown = document.getElementById("overflowDropdown");
overflowBtn.onclick = (e) => { e.stopPropagation(); overflowDropdown.classList.toggle("open"); };
document.addEventListener("click", () => overflowDropdown.classList.remove("open"));
overflowDropdown.onclick = (e) => {
  if (e.target.tagName === "BUTTON") {
    overflowDropdown.classList.remove("open");
  }
};

document.getElementById("themeBtn").onclick = toggleTheme;

const savedTheme = localStorage.getItem("labelin.theme");
setTheme(savedTheme === "light" ? "light" : "dark");

fetchProjects();
</script>
</body>
</html>
